name: Playwright UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope (p0 / full)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - p0

jobs:
  test:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:v1.40.0   # 内置 Python + Playwright
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 不需要 Setup Python，直接用容器内的 python3
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest   # 只用于生成 allure 结果
          # ----- 新增：安装 SSH 隧道所需依赖 -----
          pip install sshtunnel paramiko

      # 不需要 playwright install

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.test_scope }}" == "p0" ]; then
            echo "Running P0 tests..."
            pytest -m p0 -v --alluredir=allure-results
          else
            echo "Running full regression..."
            pytest -v --alluredir=allure-results
          fi
        env:
          # 原有数据库环境变量（保持不变）
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}   # 不要写 localhost
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          # ----- 新增：SSH 隧道所需环境变量（如果你的 db_utils.py 从环境变量读取，否则代码硬编码也可）-----
          # SSH_HOST: ${{ secrets.SSH_HOST }}      # 可选，覆盖代码中的硬编码
          # SSH_PORT: ${{ secrets.SSH_PORT }}      # 可选
          # SSH_USER: ${{ secrets.SSH_USER }}      # 可选
          # RDS_HOST: ${{ secrets.RDS_HOST }}      # 可选，数据库内网地址

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7