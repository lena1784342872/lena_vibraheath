name: Playwright UI Tests

on:
  # 代码推送时触发（默认跑全量）
  push:
    branches: [ main, master ]
  # PR 触发（默认跑全量）
  pull_request:
    branches: [ main, master ]
  # 手动触发，可选择测试范围
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope (p0 / full)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - p0

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 全量给 60 分钟，P0 实际只需 20 分钟，但不单独区分也可以

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest

      - name: Install Playwright browsers
        # 全量时安装所有浏览器，P0 时可只装 chromium（简化：统一安装所有浏览器避免增加复杂度）
        run: python -m playwright install --with-deps

      - name: Run tests
        # 根据输入参数决定 pytest 命令
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.test_scope }}" == "p0" ]; then
            echo "Running P0 tests..."
            pytest -m p0 -v --alluredir=allure-results
          else
            echo "Running full regression..."
            pytest -v --alluredir=allure-results
          fi
        env:
          # 环境变量（数据库等敏感信息）仅在需要时传递，不影响 P0 执行
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DB_HOST: localhost
          DB_USER: root
          DB_NAME: test_db

      - name: Generate Allure report
        run: |
          # 注意：allure 命令需要先安装 allure-commandline，而不是 allure-pytest
          # 这里改用 GitHub Actions 的 allure 报告生成器更简单
          npm install -g allure-commandline --save-dev
          allure generate allure-results --clean -o allure-report
        continue-on-error: true   # 避免因 allure 未安装导致工作流失败

      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7