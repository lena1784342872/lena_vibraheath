name: Playwright UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Test scope (p0 / full)'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - p0

jobs:
  test:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:v1.40.0
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install allure-pytest
          # 安装数据库依赖（如果测试需要连接数据库）
          pip install pymysql sshtunnel paramiko

      - name: Run tests
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.test_scope }}" == "p0" ]]; then
            echo "Running P0 tests..."
            pytest -m p0 -v --alluredir=allure-results
          else
            echo "Running full regression..."
            pytest -v --alluredir=allure-results
          fi
        env:
          # 强制使用无头模式（覆盖 config.py 默认值，确保 CI 中浏览器正常启动）
          HEADLESS: true
          # 可选：降低操作延迟，加快 CI 速度
          SLOW_MO: 0
          # 数据库连接信息（如果测试需要数据库，从 secrets 读取；否则可忽略）
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          # 如果数据库连接不需要，可以不设置上述变量；但需确保 conftest.py 中有 try-except 降级处理

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 7