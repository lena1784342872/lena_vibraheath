[pytest]
# ==================== 测试发现配置 ====================
# 指定测试脚本所在的目录
testpaths = test_scripts

# 测试文件命名规则
python_files = test_*.py

# 测试类命名规则
python_classes = Test*

# 测试函数命名规则
python_functions = test_*

# ==================== 运行参数配置 ====================
addopts =
    -v
    -s
    --alluredir=./reports
    --clean-alluredir


# ==================== 日志配置 ====================
# 是否在控制台显示日志
log_cli = true

# 日志级别（DEBUG < INFO < WARNING < ERROR < CRITICAL）
log_cli_level = INFO

# 日志格式
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

# 时间格式
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ==================== 标记配置 ====================
# 定义自定义标记，用于按优先级筛选测试用例
markers =
    p0: 最高优先级测试用例（核心功能）
    p1: 高优先级测试用例（重要功能）
    p2: 普通优先级测试用例（次要功能）
